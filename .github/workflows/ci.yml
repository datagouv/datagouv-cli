name: Lint, test and validate builds

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint and format the code
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Pytest
        run: uv run pytest

  build-linux:
    name: Validate PyInstaller build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Build binary
        run: uv run pyinstaller packaging/pyinstaller/datagouv.spec --clean --noconfirm

      - name: Smoke test
        run: ./scripts/smoke-test-binary.sh ./dist/datagouv-cli

  build-windows:
    name: Validate PyInstaller build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Build binary
        run: uv run pyinstaller packaging/pyinstaller/datagouv.spec --clean --noconfirm

      - name: Smoke test
        shell: pwsh
        run: ./scripts/smoke-test-binary.ps1 ./dist/datagouv-cli.exe
